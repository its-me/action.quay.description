name: Quay.io repository description
description: Update a Quay.io repository's description from a markdown file.
author: Sergey Kanafyev

branding:
  icon: book-open
  color: blue

inputs:
  namespace:
    description: >
      Quay.io namespace to publish under. For a robot account username in
      the form "org+robotname", pass it as-is — the "+robotname" suffix is
      stripped automatically to derive the organization namespace.
    required: true
  repository:
    description: Quay.io repository name (without the namespace, e.g. "workflow")
    required: true
  api-token:
    description: Quay.io OAuth application token
    required: true
  description-file:
    description: Path to a markdown file whose full content becomes the repository description.
    required: false
    default: QUAY.md
  url-completion:
    description: >
      Rewrite relative markdown links and image references in the
      description to absolute GitHub URLs (images to "raw" links, other
      relative links to "blob" links), since Quay.io renders the
      description outside the repository's context. Covers plain
      "![alt](path)" and "[label](path)" references; titled links/images,
      in-page anchors, and image-wrapped-in-link badges are left as-is.
    required: false
    default: "false"
  image-extensions:
    description: File extensions treated as images when url-completion is enabled.
    required: false
    default: bmp,gif,jpg,jpeg,png,svg,webp

runs:
  using: composite
  steps:
    - name: Update description
      shell: bash
      env:
        QUAY_NAMESPACE: ${{ inputs.namespace }}
        QUAY_API_TOKEN: ${{ inputs.api-token }}
        QUAY_REPOSITORY: ${{ inputs.repository }}
        QUAY_FILE: ${{ inputs.description-file }}
        QUAY_URL_COMPLETION: ${{ inputs.url-completion }}
        QUAY_IMAGE_EXTS: ${{ inputs.image-extensions }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        description=$(cat "$QUAY_FILE")
        if [ "$QUAY_URL_COMPLETION" = "true" ]; then
          description=$(jq -n \
            --arg content "$description" \
            --arg exts_raw "$QUAY_IMAGE_EXTS" \
            --arg raw "$REPO_URL/raw/$REF_NAME/" \
            --arg blob "$REPO_URL/blob/$REF_NAME/" \
            -r '
              def escape_regex:
                gsub("(?<c>[\\^$.|?*+(){}\\[\\]\\\\])"; "\\\(.c)");
              ($exts_raw | split(",") | map(escape_regex) | join("|")) as $exts
              | $content
              | gsub("(?<left>!\\[[^\\]]*\\])\\((?<url>[^:)#\\s\"][^:)\\s\"]*\\.(" + $exts + "))(?<title>(?:\\s+\"[^\"]*\")?)\\)"; "\(.left)(" + $raw + "\(.url)\(.title))")
              | gsub("(?<left>\\[!\\[[^\\]]*\\]\\([^)]*\\)\\])\\((?<url>[^:)#\\s\"][^:)\\s\"]*)(?<title>(?:\\s+\"[^\"]*\")?)\\)"; "\(.left)(" + $blob + "\(.url)\(.title))")
              | gsub("(?<left>(?<!!)\\[[^\\]]+\\])\\((?<url>[^:)#\\s\"][^:)\\s\"]*)(?<title>(?:\\s+\"[^\"]*\")?)\\)"; "\(.left)(" + $blob + "\(.url)\(.title))")
              | split("\n")
              | map(gsub("(?<left>^\\[[^\\]]+\\]:[ \\t]+)(?<url>[^:)#\\s\"][^:)\\s\"]*)(?=\\s|$)"; "\(.left)" + $blob + "\(.url)"))
              | join("\n")
            ')
        fi
        max_bytes=25000
        if [ "$(printf '%s' "$description" | wc -c)" -gt "$max_bytes" ]; then
          echo "::warning::Description exceeds ${max_bytes} bytes and has been truncated. Quay.io does not document a hard limit for this field; this is a conservative safety cap."
          description=$(jq -n \
            --arg content "$description" \
            --argjson max "$max_bytes" \
            -r '
              def utf8len:
                explode | map(if . < 128 then 1 elif . < 2048 then 2 elif . < 65536 then 3 else 4 end) | add // 0;
              def close_unclosed_fence:
                . as $s
                | ($s | split("\n")) as $lines
                | (reduce $lines[] as $line (false; if ($line | test("^```")) then (. | not) else . end)) as $in_fence
                | if $in_fence then $s + "\n```" else $s end;
              def truncate_bytes(n):
                if (. | utf8len) <= n then .
                else
                  . as $s
                  | (first(range(n; -1; -1) as $k | $s[0:$k] | select((. | utf8len) <= n))) as $cut
                  | ($cut | rindex("\n")) as $nl
                  | (if $nl then $cut[0:$nl] else $cut end)
                  | close_unclosed_fence
                end;
              $content | truncate_bytes($max)
            ')
        fi
        curl -fsSL --retry 3 --retry-delay 5 --retry-connrefused \
          -X PUT "https://quay.io/api/v1/repository/${QUAY_NAMESPACE%%+*}/$QUAY_REPOSITORY" \
          -H "Authorization: Bearer $QUAY_API_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary "$(jq -n \
            --arg description "$description" \
            '{description: $description}')"
